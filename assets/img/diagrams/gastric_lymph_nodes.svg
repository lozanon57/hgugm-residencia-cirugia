<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gastric Lymph Node Stations">
  <title>Gastric Lymph Node Stations — JGCA 5th Edition</title>
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .station { font-size: 9px; font-weight: 700; }
      .d1 { fill: white; }
      .d2 { fill: white; }
    </style>
  </defs>

  <rect width="600" height="500" fill="#FAFBFC" rx="8"/>

  <!-- Title -->
  <text x="300" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#1B3A6B">Gastric Lymph Node Stations</text>
  <text x="300" y="42" text-anchor="middle" font-size="10" fill="#7A8CA0">JGCA 5th Edition Classification — D1 and D2 dissection levels</text>

  <!-- Stomach outline (anterior view) -->
  <!-- Fundus -->
  <path d="M 175 90 Q 155 75 145 90 Q 130 110 135 140 Q 140 165 155 180" fill="rgba(27,58,107,0.06)" stroke="#1B3A6B" stroke-width="2.5" fill-rule="evenodd"/>
  <!-- Body -->
  <path d="M 155 180 Q 150 210 155 245 Q 160 275 175 295 Q 195 315 220 325" fill="none" stroke="#1B3A6B" stroke-width="2.5"/>
  <!-- Antrum -->
  <path d="M 220 325 Q 260 340 300 338 Q 335 336 360 320 Q 385 302 390 275 Q 395 248 385 225" fill="none" stroke="#1B3A6B" stroke-width="2.5"/>
  <!-- Pylorus -->
  <path d="M 385 225 Q 392 210 400 205 Q 415 198 425 205 Q 435 212 435 225 Q 435 240 425 248 Q 415 255 400 250 Q 390 245 385 235" fill="rgba(27,58,107,0.08)" stroke="#1B3A6B" stroke-width="2"/>
  <!-- Greater curvature lower -->
  <path d="M 175 90 Q 200 80 240 78 Q 280 76 310 80 Q 345 85 370 100 Q 390 115 395 140 Q 400 165 395 190 Q 392 205 385 220" fill="none" stroke="#1B3A6B" stroke-width="2.5"/>
  <!-- Close stomach at cardia -->
  <path d="M 175 90 Q 180 88 190 88" fill="none" stroke="#1B3A6B" stroke-width="2.5"/>

  <!-- Cardia label -->
  <text x="162" y="88" text-anchor="middle" font-size="9" fill="#1B3A6B" font-weight="600">Cardia</text>
  <!-- Pylorus label -->
  <text x="430" y="230" font-size="9" fill="#1B3A6B" font-weight="600">Pylorus</text>
  <!-- Fundus label -->
  <text x="148" y="130" text-anchor="middle" font-size="9" fill="#1B3A6B">Fundus</text>
  <!-- Greater curvature -->
  <text x="290" y="72" text-anchor="middle" font-size="8" fill="#7A8CA0">Greater curvature</text>
  <!-- Lesser curvature -->
  <text x="270" y="200" text-anchor="middle" font-size="8" fill="#7A8CA0">Lesser curvature</text>

  <!-- D1 Stations (teal circles) — stations 1-6 -->
  <!-- Station 1: Right cardia -->
  <circle cx="188" cy="105" r="10" fill="#0D6E6E" stroke="white" stroke-width="1.5"/>
  <text x="188" y="109" text-anchor="middle" class="station d1">1</text>
  <text x="170" y="98" text-anchor="end" font-size="8" fill="#0D6E6E">R. cardia</text>

  <!-- Station 2: Left cardia -->
  <circle cx="152" cy="118" r="10" fill="#0D6E6E" stroke="white" stroke-width="1.5"/>
  <text x="152" y="122" text-anchor="middle" class="station d1">2</text>
  <text x="138" y="115" text-anchor="end" font-size="8" fill="#0D6E6E">L. cardia</text>

  <!-- Station 3: Lesser curvature -->
  <circle cx="250" cy="175" r="10" fill="#0D6E6E" stroke="white" stroke-width="1.5"/>
  <text x="250" y="179" text-anchor="middle" class="station d1">3</text>
  <text x="240" y="168" text-anchor="middle" font-size="8" fill="#0D6E6E">Lesser curv.</text>

  <!-- Station 4: Greater curvature -->
  <circle cx="250" cy="105" r="10" fill="#0D6E6E" stroke="white" stroke-width="1.5"/>
  <text x="250" y="109" text-anchor="middle" class="station d1">4</text>
  <text x="250" y="95" text-anchor="middle" font-size="8" fill="#0D6E6E">Greater curv.</text>

  <!-- Station 5: Suprapyloric -->
  <circle cx="370" cy="182" r="10" fill="#0D6E6E" stroke="white" stroke-width="1.5"/>
  <text x="370" y="186" text-anchor="middle" class="station d1">5</text>
  <text x="385" y="178" font-size="8" fill="#0D6E6E">Suprapyloric</text>

  <!-- Station 6: Infrapyloric -->
  <circle cx="390" cy="268" r="10" fill="#0D6E6E" stroke="white" stroke-width="1.5"/>
  <text x="390" y="272" text-anchor="middle" class="station d1">6</text>
  <text x="405" y="272" font-size="8" fill="#0D6E6E">Infrapyloric</text>

  <!-- D2 Additional Stations (navy circles) — stations 7-12 -->
  <!-- Station 7: Left gastric artery -->
  <circle cx="220" cy="242" r="10" fill="#1B3A6B" stroke="white" stroke-width="1.5"/>
  <text x="220" y="246" text-anchor="middle" class="station d2">7</text>
  <text x="205" y="256" text-anchor="end" font-size="8" fill="#1B3A6B">L. gastric a.</text>

  <!-- Station 8: Common hepatic artery -->
  <circle cx="330" cy="255" r="10" fill="#1B3A6B" stroke="white" stroke-width="1.5"/>
  <text x="330" y="259" text-anchor="middle" class="station d2">8</text>
  <text x="345" y="262" font-size="8" fill="#1B3A6B">Com. hepatic a.</text>

  <!-- Station 9: Celiac axis -->
  <circle cx="220" cy="290" r="10" fill="#1B3A6B" stroke="white" stroke-width="1.5"/>
  <text x="220" y="294" text-anchor="middle" class="station d2">9</text>
  <text x="205" y="304" text-anchor="end" font-size="8" fill="#1B3A6B">Celiac axis</text>

  <!-- Station 10: Splenic hilum -->
  <circle cx="138" cy="198" r="10" fill="#1B3A6B" stroke="white" stroke-width="1.5"/>
  <text x="138" y="202" text-anchor="middle" class="station d2">10</text>
  <text x="122" y="210" text-anchor="end" font-size="8" fill="#1B3A6B">Splenic hilum</text>

  <!-- Station 11: Splenic artery -->
  <circle cx="168" cy="218" r="10" fill="#1B3A6B" stroke="white" stroke-width="1.5"/>
  <text x="168" y="222" text-anchor="middle" class="station d2">11</text>
  <text x="152" y="232" text-anchor="end" font-size="8" fill="#1B3A6B">Splenic a.</text>

  <!-- Station 12: Hepatoduodenal ligament -->
  <circle cx="435" cy="175" r="10" fill="#1B3A6B" stroke="white" stroke-width="1.5"/>
  <text x="435" y="179" text-anchor="middle" class="station d2">12</text>
  <text x="450" y="175" font-size="8" fill="#1B3A6B">Hepatoduod. lig.</text>

  <!-- Vascular anatomy (dotted) -->
  <!-- Left gastric artery -->
  <path d="M 195 250 Q 208 245 220 242" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Celiac axis trunk -->
  <path d="M 220 290 L 275 310" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Common hepatic -->
  <path d="M 330 255 L 340 248" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Splenic a -->
  <path d="M 138 198 L 155 212" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Aorta indicator -->
  <rect x="258" y="308" width="22" height="42" rx="4" fill="rgba(148,163,184,0.3)" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="269" y="332" text-anchor="middle" font-size="8" fill="#64748B" font-weight="700">Ao</text>
  <text x="269" y="342" text-anchor="middle" font-size="7" fill="#94A3B8">rta</text>

  <!-- Legend -->
  <rect x="20" y="350" width="260" height="135" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="30" y="368" font-size="11" font-weight="700" fill="#1A1A2E">Dissection Levels</text>

  <circle cx="40" cy="385" r="8" fill="#0D6E6E"/>
  <text x="40" y="389" text-anchor="middle" font-size="8" font-weight="700" fill="white">1</text>
  <text x="55" y="389" font-size="10" fill="#555">D1 Dissection — Stations 1–6</text>
  <text x="55" y="402" font-size="9" fill="#7A8CA0">Perigastric nodes only</text>

  <circle cx="40" cy="420" r="8" fill="#1B3A6B"/>
  <text x="40" y="424" text-anchor="middle" font-size="8" font-weight="700" fill="white">7</text>
  <text x="55" y="424" font-size="10" fill="#555">D2 Dissection — Stations 7–12</text>
  <text x="55" y="437" font-size="9" fill="#7A8CA0">+ Perivascular nodes along named vessels</text>

  <rect x="30" y="448" width="238" height="28" rx="5" fill="rgba(200,147,58,0.1)" stroke="#C8933A" stroke-width="1"/>
  <text x="40" y="461" font-size="8" font-weight="700" fill="#7A5A1A">🔑 D2 is standard for curative-intent gastrectomy</text>
  <text x="40" y="473" font-size="8" fill="#7A5A1A">Minimum 16 lymph nodes required for staging (JGCA)</text>

  <!-- Surgical approach note -->
  <rect x="295" y="350" width="285" height="135" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="305" y="368" font-size="11" font-weight="700" fill="#1A1A2E">Key Landmark Trials</text>
  <text x="305" y="385" font-size="9" fill="#555" font-weight="600">Dutch D1D2 Trial (Bonenkamp, NEJM 1999):</text>
  <text x="305" y="397" font-size="9" fill="#7A8CA0">D2 vs D1 — higher morbidity initially, same OS</text>
  <text x="305" y="409" font-size="9" fill="#7A8CA0">at 5yr. 15-yr follow-up: D2 survival advantage.</text>
  <text x="305" y="424" font-size="9" fill="#555" font-weight="600">ACTS-GC (Sakuramoto, NEJM 2007):</text>
  <text x="305" y="436" font-size="9" fill="#7A8CA0">S-1 adjuvant after D2 gastrectomy → 3-yr OS</text>
  <text x="305" y="448" font-size="9" fill="#7A8CA0">80.1% vs 70.1%. Standard in Asia.</text>
  <text x="305" y="463" font-size="9" fill="#555" font-weight="600">FLOT4 (Al-Batran, Lancet 2019):</text>
  <text x="305" y="475" font-size="9" fill="#7A8CA0">Periop FLOT superior to ECF/ECX. Western</text>
  <text x="305" y="487" font-size="9" fill="#7A8CA0">standard for resectable gastric/GEJ cancer.</text>
</svg>
