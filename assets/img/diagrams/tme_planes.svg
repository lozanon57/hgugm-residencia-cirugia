<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Total Mesorectal Excision Surgical Planes">
  <title>Total Mesorectal Excision — Surgical Planes</title>
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .label { font-size: 12px; fill: #1A1A2E; }
      .label-sm { font-size: 10px; fill: #7A8CA0; }
      .label-bold { font-size: 13px; fill: #1A1A2E; font-weight: 600; }
      .navy { fill: #1B3A6B; }
      .teal { fill: #0D6E6E; }
      .gold { fill: #C8933A; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="#FAFBFC" rx="8"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1B3A6B">Total Mesorectal Excision — Surgical Planes</text>
  <text x="300" y="48" text-anchor="middle" font-size="11" fill="#7A8CA0">Cross-section at mid-pelvis (male)</text>

  <!-- Sacrum (posterior) -->
  <ellipse cx="300" cy="410" rx="90" ry="38" fill="#E8E0D5" stroke="#B0A090" stroke-width="1.5"/>
  <text x="300" y="415" text-anchor="middle" class="label" font-weight="600">Sacrum</text>

  <!-- Presacral fascia -->
  <path d="M 218 380 Q 300 365 382 380" fill="none" stroke="#7A5A1A" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="300" y="360" text-anchor="middle" class="label-sm">Presacral fascia (Waldeyer)</text>

  <!-- Holy plane / correct dissection plane (gold fill) -->
  <path d="M 228 355 Q 300 340 372 355 Q 380 310 380 280 Q 380 250 372 230 Q 300 215 228 230 Q 220 250 220 280 Q 220 310 228 355 Z"
        fill="rgba(200,147,58,0.18)" stroke="#C8933A" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Mesorectum -->
  <ellipse cx="300" cy="285" rx="65" ry="85" fill="rgba(13,110,110,0.12)" stroke="#0D6E6E" stroke-width="2.5"/>
  <text x="300" y="240" text-anchor="middle" class="label" fill="#0D6E6E" font-weight="600">Mesorectum</text>

  <!-- Mesorectal fascia propria (navy outline) -->
  <ellipse cx="300" cy="285" rx="65" ry="85" fill="none" stroke="#1B3A6B" stroke-width="3"/>
  <text x="300" y="208" text-anchor="middle" class="label-sm" fill="#1B3A6B">Mesorectal fascia propria</text>

  <!-- Rectum (inner) -->
  <ellipse cx="300" cy="285" rx="25" ry="40" fill="rgba(27,58,107,0.1)" stroke="#1B3A6B" stroke-width="2"/>
  <text x="300" y="290" text-anchor="middle" class="label" fill="#1B3A6B">Rectum</text>

  <!-- Denonvilliers fascia (anterior) -->
  <path d="M 235 220 Q 300 200 365 220" fill="none" stroke="#6B21A8" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="390" y="218" class="label-sm" fill="#6B21A8" text-anchor="start">Denonvilliers</text>
  <text x="390" y="230" class="label-sm" fill="#6B21A8" text-anchor="start">fascia</text>

  <!-- Hypogastric nerves (dotted teal lines) -->
  <path d="M 160 310 L 218 290" stroke="#0D6E6E" stroke-width="1.5" stroke-dasharray="3,3"/>
  <path d="M 158 330 L 218 310" stroke="#0D6E6E" stroke-width="1.5" stroke-dasharray="3,3"/>
  <circle cx="155" cy="310" r="4" fill="#0D6E6E"/>
  <circle cx="152" cy="330" r="4" fill="#0D6E6E"/>
  <text x="145" y="300" class="label-sm" fill="#0D6E6E" text-anchor="middle">Hypogastric</text>
  <text x="145" y="312" class="label-sm" fill="#0D6E6E" text-anchor="middle">nerves</text>

  <!-- Right side nerves -->
  <path d="M 440 310 L 382 290" stroke="#0D6E6E" stroke-width="1.5" stroke-dasharray="3,3"/>
  <path d="M 442 330 L 382 310" stroke="#0D6E6E" stroke-width="1.5" stroke-dasharray="3,3"/>
  <circle cx="445" cy="310" r="4" fill="#0D6E6E"/>
  <circle cx="448" cy="330" r="4" fill="#0D6E6E"/>

  <!-- Holy plane label -->
  <rect x="140" y="265" width="70" height="28" rx="4" fill="#C8933A" fill-opacity="0.15" stroke="#C8933A" stroke-width="1"/>
  <text x="175" y="279" text-anchor="middle" class="label-sm" fill="#7A5A1A" font-weight="700">✓ Holy plane</text>
  <text x="175" y="290" text-anchor="middle" class="label-sm" fill="#7A5A1A">Correct plane</text>
  <path d="M 210 279 L 225 280" stroke="#C8933A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Defs for arrow -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#C8933A"/>
    </marker>
    <marker id="arrN" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#1B3A6B"/>
    </marker>
  </defs>

  <!-- Levator ani muscles (lateral) -->
  <path d="M 170 380 Q 220 350 220 300 Q 220 250 250 230" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <path d="M 430 380 Q 380 350 380 300 Q 380 250 350 230" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <text x="148" y="395" class="label-sm" fill="#94A3B8">Levator ani</text>
  <text x="430" y="395" class="label-sm" fill="#94A3B8">Levator ani</text>

  <!-- Pelvic wall -->
  <path d="M 90 430 Q 100 350 130 280 Q 160 210 200 170" fill="none" stroke="#CBD5E1" stroke-width="3"/>
  <path d="M 510 430 Q 500 350 470 280 Q 440 210 400 170" fill="none" stroke="#CBD5E1" stroke-width="3"/>

  <!-- Legend -->
  <rect x="20" y="120" width="180" height="120" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="30" y="138" class="label-bold">Legend</text>
  <line x1="30" y1="148" x2="50" y2="148" stroke="#1B3A6B" stroke-width="3"/>
  <text x="56" y="152" class="label-sm">Mesorectal fascia propria</text>
  <line x1="30" y1="164" x2="50" y2="164" stroke="#C8933A" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="56" y="168" class="label-sm">Holy plane (correct)</text>
  <line x1="30" y1="180" x2="50" y2="180" stroke="#7A5A1A" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="56" y="184" class="label-sm">Presacral fascia</text>
  <line x1="30" y1="196" x2="50" y2="196" stroke="#0D6E6E" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="56" y="200" class="label-sm">Autonomic nerves</text>
  <line x1="30" y1="212" x2="50" y2="212" stroke="#6B21A8" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="56" y="216" class="label-sm">Denonvilliers fascia</text>

  <!-- Key fact box -->
  <rect x="20" y="60" width="270" height="52" rx="6" fill="rgba(200,147,58,0.1)" stroke="#C8933A" stroke-width="1.5"/>
  <text x="30" y="78" class="label-sm" fill="#7A5A1A" font-weight="700">🔑 Key Point</text>
  <text x="30" y="93" class="label-sm" fill="#7A5A1A">Intact mesorectum → &lt;5% local recurrence</text>
  <text x="30" y="106" class="label-sm" fill="#7A5A1A">Mesorectal defects → &gt;20% (Quirke, Lancet 2009)</text>
</svg>
