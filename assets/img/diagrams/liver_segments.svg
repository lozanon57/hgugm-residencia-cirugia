<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Couinaud Liver Segments">
  <title>Liver Segments — Couinaud Classification</title>
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .seg-label { font-size: 13px; font-weight: 700; }
      .seg-sublabel { font-size: 9px; fill: #555; }
      .legend-text { font-size: 10px; }
    </style>
  </defs>

  <rect width="600" height="500" fill="#FAFBFC" rx="8"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1B3A6B">Couinaud Liver Segments</text>
  <text x="300" y="46" text-anchor="middle" font-size="11" fill="#7A8CA0">Anterior view — Functional anatomy for resection planning</text>

  <!-- Main liver outline -->
  <path d="M 100 120 Q 80 110 75 140 Q 65 200 75 270 Q 85 330 120 370 Q 160 400 220 405 Q 280 410 340 405 Q 400 398 450 375 Q 500 345 520 300 Q 540 255 530 200 Q 520 155 500 130 Q 470 105 430 100 Q 380 95 330 98 Q 280 100 240 105 Q 200 110 160 115 Q 130 118 100 120 Z"
        fill="rgba(200,147,58,0.08)" stroke="#C8933A" stroke-width="2.5"/>

  <!-- Hepatic veins (teal) -->
  <!-- Right hepatic vein -->
  <path d="M 420 105 Q 430 150 435 200 Q 440 250 435 290" fill="none" stroke="#0D6E6E" stroke-width="2.5"/>
  <!-- Middle hepatic vein -->
  <path d="M 315 100 Q 320 160 315 220 Q 312 270 315 300" fill="none" stroke="#0D6E6E" stroke-width="2.5"/>
  <!-- Left hepatic vein -->
  <path d="M 205 108 Q 210 160 208 210 Q 207 255 210 290" fill="none" stroke="#0D6E6E" stroke-width="2.5"/>
  <!-- IVC -->
  <ellipse cx="300" cy="105" rx="22" ry="14" fill="#0D6E6E" fill-opacity="0.2" stroke="#0D6E6E" stroke-width="2"/>
  <text x="300" y="109" text-anchor="middle" font-size="9" fill="#0D6E6E" font-weight="700">IVC</text>

  <!-- Portal scissura (main) -->
  <path d="M 300 105 Q 305 250 310 390" fill="none" stroke="#1B3A6B" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Segment I — Caudate -->
  <ellipse cx="300" cy="130" rx="32" ry="20" fill="rgba(148,163,184,0.4)" stroke="#64748B" stroke-width="1.5"/>
  <text x="300" y="133" text-anchor="middle" class="seg-label" fill="#334155">I</text>
  <text x="300" y="143" text-anchor="middle" font-size="8" fill="#64748B">Caudate</text>

  <!-- Segment II — Left lateral superior -->
  <path d="M 85 150 Q 90 120 140 115 Q 175 112 200 118 Q 208 160 207 200 Q 207 230 205 255 Q 165 250 130 240 Q 90 225 80 190 Q 78 170 85 150 Z"
        fill="rgba(13,110,110,0.15)" stroke="#0D6E6E" stroke-width="1.5"/>
  <text x="147" y="185" text-anchor="middle" class="seg-label" fill="#0D6E6E">II</text>

  <!-- Segment III — Left lateral inferior -->
  <path d="M 85 195 Q 80 240 90 290 Q 100 335 140 360 Q 175 375 210 375 Q 212 320 210 280 Q 208 255 207 230 Q 165 235 130 240 Q 95 228 85 195 Z"
        fill="rgba(13,110,110,0.1)" stroke="#0D6E6E" stroke-width="1.5"/>
  <text x="148" y="300" text-anchor="middle" class="seg-label" fill="#0D6E6E">III</text>

  <!-- Segment IV — Left medial -->
  <path d="M 210 118 Q 250 112 310 105 Q 318 160 315 220 Q 313 270 312 310 Q 275 320 245 318 Q 218 315 212 295 Q 208 270 208 240 Q 207 200 210 118 Z"
        fill="rgba(27,58,107,0.12)" stroke="#1B3A6B" stroke-width="1.5"/>
  <text x="262" y="215" text-anchor="middle" class="seg-label" fill="#1B3A6B">IVa</text>
  <text x="262" y="285" text-anchor="middle" class="seg-label" fill="#1B3A6B">IVb</text>

  <!-- Segment V — Right anterior inferior -->
  <path d="M 318 220 Q 360 215 408 220 Q 435 230 440 265 Q 438 300 435 320 Q 400 340 360 350 Q 325 355 314 340 Q 312 310 315 270 Q 316 245 318 220 Z"
        fill="rgba(200,147,58,0.15)" stroke="#C8933A" stroke-width="1.5"/>
  <text x="378" y="285" text-anchor="middle" class="seg-label" fill="#92621A">V</text>

  <!-- Segment VI — Right posterior inferior -->
  <path d="M 440 265 Q 460 250 500 255 Q 530 265 530 300 Q 528 340 510 365 Q 485 390 450 395 Q 415 398 385 390 Q 360 378 360 360 Q 362 340 380 335 Q 408 328 434 322 Q 438 300 440 265 Z"
        fill="rgba(200,147,58,0.1)" stroke="#C8933A" stroke-width="1.5"/>
  <text x="468" y="345" text-anchor="middle" class="seg-label" fill="#92621A">VI</text>

  <!-- Segment VII — Right posterior superior -->
  <path d="M 438 165 Q 465 150 500 145 Q 530 148 530 185 Q 532 225 530 260 Q 510 260 490 258 Q 462 252 442 245 Q 436 220 436 195 Q 436 180 438 165 Z"
        fill="rgba(200,147,58,0.08)" stroke="#C8933A" stroke-width="1.5"/>
  <text x="486" y="205" text-anchor="middle" class="seg-label" fill="#92621A">VII</text>

  <!-- Segment VIII — Right anterior superior -->
  <path d="M 318 105 Q 365 98 420 100 Q 440 105 440 130 Q 440 155 438 185 Q 412 190 385 195 Q 360 198 336 200 Q 320 200 318 185 Q 316 160 318 105 Z"
        fill="rgba(27,58,107,0.1)" stroke="#1B3A6B" stroke-width="1.5"/>
  <text x="380" y="152" text-anchor="middle" class="seg-label" fill="#1B3A6B">VIII</text>

  <!-- Hepatic vein labels -->
  <text x="412" y="100" text-anchor="middle" font-size="9" fill="#0D6E6E" font-weight="600">RHV</text>
  <text x="300" y="92" text-anchor="middle" font-size="9" fill="#0D6E6E" font-weight="600">MHV</text>
  <text x="192" y="100" text-anchor="middle" font-size="9" fill="#0D6E6E" font-weight="600">LHV</text>

  <!-- Gallbladder fossa -->
  <ellipse cx="310" cy="365" rx="28" ry="15" fill="rgba(34,197,94,0.2)" stroke="#16A34A" stroke-width="1.5"/>
  <text x="310" y="369" text-anchor="middle" font-size="9" fill="#16A34A">GB fossa</text>

  <!-- Left/Right lobe label -->
  <text x="175" y="430" text-anchor="middle" font-size="11" fill="#0D6E6E" font-weight="700">LEFT LOBE</text>
  <text x="175" y="443" text-anchor="middle" font-size="9" fill="#7A8CA0">Seg I–IV</text>
  <text x="420" y="430" text-anchor="middle" font-size="11" fill="#1B3A6B" font-weight="700">RIGHT LOBE</text>
  <text x="420" y="443" text-anchor="middle" font-size="9" fill="#7A8CA0">Seg V–VIII</text>

  <!-- Dividing line label -->
  <text x="318" y="430" text-anchor="start" font-size="8" fill="#1B3A6B">Main portal</text>
  <text x="318" y="441" text-anchor="start" font-size="8" fill="#1B3A6B">scissura</text>

  <!-- Legend -->
  <rect x="18" y="62" width="195" height="110" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="28" y="78" font-size="11" font-weight="700" fill="#1A1A2E">Resection Reference</text>
  <text x="28" y="94" class="legend-text" fill="#555">Seg II–III: Left lateral sectionectomy</text>
  <text x="28" y="108" class="legend-text" fill="#555">Seg II–IV: Left hepatectomy</text>
  <text x="28" y="122" class="legend-text" fill="#555">Seg V–VIII: Right hepatectomy</text>
  <text x="28" y="136" class="legend-text" fill="#555">Seg VI–VII: Right post. sectionectomy</text>
  <text x="28" y="150" class="legend-text" fill="#555">Seg IVb+V+VIII: Central hepatectomy</text>
  <text x="28" y="164" class="legend-text" fill="#555">Seg I: Caudate lobectomy</text>

  <!-- Color key -->
  <rect x="18" y="182" width="130" height="56" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="28" y1="196" x2="48" y2="196" stroke="#0D6E6E" stroke-width="2.5"/>
  <text x="54" y="200" class="legend-text" fill="#555">Hepatic veins</text>
  <line x1="28" y1="212" x2="48" y2="212" stroke="#1B3A6B" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="54" y="216" class="legend-text" fill="#555">Main scissura</text>
  <rect x="28" y="222" width="16" height="10" fill="rgba(13,110,110,0.15)" stroke="#0D6E6E" stroke-width="1"/>
  <text x="50" y="231" class="legend-text" fill="#555">Left lobe segs</text>
</svg>
